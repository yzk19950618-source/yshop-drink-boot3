# 容器 / 微信云托管：与 local 组合使用（SPRING_PROFILES_ACTIVE=local,cloud）
# 端口：云托管注入 PORT；未注入时与常见服务端口 8080 一致
# 中间件：通过环境变量指向云数据库、云 Redis（勿在仓库中写死生产密码）
#
# 若日志里 JDBC 仍是 127.0.0.1:3306，说明 cloud 未生效或 MYSQL_* 未进容器。可二选一：
# A) 确认激活 profile：SPRING_PROFILES_ACTIVE=local,cloud（注意逗号；部分控制台需加引号）
# B) 不依赖 cloud，直接用 Spring Boot 环境变量覆盖主库（与 profile 无关，优先级更高）：
#    SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL=jdbc:mysql://主机:端口/库名?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&useUnicode=true&characterEncoding=UTF-8
#    SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME=root
#    SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD=你的密码
#    从库与主库相同时可再设 SPRING_DATASOURCE_DYNAMIC_DATASOURCE_SLAVE_URL（及 USERNAME/PASSWORD）或保持 slave lazy + 与主库相同的 MYSQL_*
#
# Redis：勿写 password: ${REDIS_PASSWORD:}（无变量时空串会触发 Redisson AUTH，免密实例报错）。
# 免密：不配置 REDIS_PASSWORD / SPRING_DATA_REDIS_PASSWORD。
# 有密：环境变量 SPRING_DATA_REDIS_PASSWORD，或非空的 REDIS_PASSWORD（由 RedisPasswordEnvironmentPostProcessor 注入）。

server:
  port: ${PORT:8080}

spring:
  datasource:
    dynamic:
      datasource:
        master:
          url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:yixiang-drink-open}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&useUnicode=true&characterEncoding=UTF-8&connectTimeout=15000&socketTimeout=60000
          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_PASSWORD:root}
        slave:
          lazy: true
          url: jdbc:mysql://${MYSQL_SLAVE_HOST:${MYSQL_HOST:127.0.0.1}}:${MYSQL_SLAVE_PORT:${MYSQL_PORT:3306}}/${MYSQL_SLAVE_DATABASE:${MYSQL_DATABASE:yixiang-drink-open}}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&useUnicode=true&characterEncoding=UTF-8&connectTimeout=15000&socketTimeout=60000
          username: ${MYSQL_SLAVE_USERNAME:${MYSQL_USERNAME:root}}
          password: ${MYSQL_SLAVE_PASSWORD:${MYSQL_PASSWORD:root}}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ~ # YAML null：免密；有密码时用 SPRING_DATA_REDIS_PASSWORD 或非空 REDIS_PASSWORD 覆盖

yshop:
  # 云上 Redis（跨 VPC 等）：减轻 XREADGROUP BLOCK 空闲断连导致的 WriteRedisConnectionException / ClosedChannel
  cloud:
    redisson:
      netty-threads: 32 # 可被环境变量 YSHOP_CLOUD_REDISSON_NETTY_THREADS 等覆盖（Spring 松散绑定）
      ping-connection-interval-ms: 15000 # 定时 PING（毫秒）；不配或 ≤0 则跳过

  security:
    mock-enable: ${YSHOP_SECURITY_MOCK_ENABLE:false}
  pay:
    weixin-mock-enabled: ${YSHOP_PAY_WEIXIN_MOCK_ENABLED:false}
  captcha:
    enable: ${YSHOP_CAPTCHA_ENABLE:false}
  h5: ${YSHOP_H5_BASE:http://localhost:80}
management:
  endpoints:
    web:
      exposure:
        include: health,info   # 关键：确保 health 端点被暴露
  endpoint:
    health:
      show-details: always     # 推荐开启，方便调试
      probes:
        enabled: true          # 推荐开启，适配云平台探针